part.date.raw=select max(partition_date) part_date from mnaas.move_sim_inventory_status
part.date.aggr=select max(partition_date) part_date from mnaas.move_sim_inventory_count
part.date.month=select max(status_date) status_date from mnaas.move_curr_month_count

truncate.month=truncate table mnaas.move_curr_month_count
insert.month.active=insert into mnaas.move_curr_month_count partition (status_date) select buss_unit_id, prod_status, sum(count_sim), partition_date from mnaas.move_sim_inventory_count where partition_date between to_date(trunc(now(), 'month')) and to_date(date_sub(trunc(now(), 'dd'), 1)) and prod_status not in ('Preactive', 'SIMAVAILABLE') group by prod_status, partition_date, buss_unit_id
insert.month.activity=insert into mnaas.move_curr_month_count partition (status_date) select split_part(split_part(businessunittag, ''|'', (businessunitlevel*3)-1), ''='', 2) buss_unit_id, ''Activity'' prod_status, count(distinct sim), {0} from mnaas.traffic_details_raw_daily where partition_date between ? and ? group by buss_unit_id
insert.lastmonth.active=insert into mnaas.move_curr_month_count partition (status_date) select buss_unit_id, prod_status, sum(count_sim), partition_date from mnaas.move_sim_inventory_count where partition_date between to_date(months_sub(trunc(now(), 'month'), 1)) and to_date(days_sub(trunc(now(), 'month'), 1)) and prod_status not in ('Preactive', 'SIMAVAILABLE') group by prod_status, partition_date, buss_unit_id

drop.part.year=ALTER TABLE mnaas.move_curr_year_count DROP IF EXISTS PARTITION(status_month_year = {0})
insert.year.active=insert into mnaas.move_curr_year_count partition (status_month_year) select buss_unit_id, prod_status, sum(count_sim), {0} from mnaas.move_sim_inventory_count where partition_date = ? and prod_status not in (''Preactive'', ''SIMAVAILABLE'') group by prod_status, buss_unit_id
insert.year.activity=insert into mnaas.move_curr_year_count partition (status_month_year) select split_part(split_part(businessunittag, ''|'', (businessunitlevel*3)-1), ''='', 2) buss_unit_id, ''Activity'' prod_status, count(distinct sim), {0} pdate from mnaas.traffic_details_raw_daily where partition_date between ? and ? group by buss_unit_id

get.partiton.count=select count(distinct status_month_year) count from mnaas.move_curr_year_count
get.min.part=select min(status_month_year) status_date from mnaas.move_curr_year_count